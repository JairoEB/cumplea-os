<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis 50 Años - Invitación</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="pantalla-1" class="pantalla">
        <div class="contenedor-invitacion">
            <img src="fondo_sobre.png" alt="Fondo del sobre" id="imagen-fondo-sobre">
            
            <div id="caja-sobre" class="overlay">
                <img src="sobre.png" alt="Sobre de invitación" id="sobre">
            </div>
        </div>
    </div>

    <div id="pantalla-2" class="pantalla oculto">
        
        <div class="contenedor-invitacion">
            <img src="invitacion.jpg" alt="Invitación completa" id="imagen-larga">
            
            <div id="cuenta-regresiva" class="overlay">
                <div class="tiempo"><span id="dias">00</span><p>DÍAS</p></div>
                <div class="tiempo"><span id="horas">00</span><p>HORAS</p></div>
                <div class="tiempo"><span id="minutos">00</span><p>MINUTOS</p></div>
                <div class="tiempo"><span id="segundos">00</span><p>SEGUNDOS</p></div>
            </div>

            <a href="link google maps" target="_blank" id="btn-ubicacion" class="overlay"></a>

            <a href="https://api.whatsapp.com/send?phone=51991755013&text=Muchas%20gracias%20por%20la%20invitaci%C3%B3n%20%E2%9C%A8%EF%B8%8F%F0%9F%8E%8A%2C%20confirmo%20mi%20asistencia%20para%20este%20d%C3%ADa%20muy%20especial%20%F0%9F%8E%89" target="_blank" id="btn-confirmar" class="overlay"></a>
        </div>

        <audio id="cancion" loop>
            <source src="cancion.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
